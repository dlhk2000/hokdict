<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hokkien Dictionary</title>

 
<style>
body{
    font-family: Arial, sans-serif;
    max-width: 800px;
    margin: auto;
    padding: 20px;
}



input, textarea{
    width: 100%;
    padding: 8px;
    margin: 5px 0;
    box-sizing: border-box;
}

button{
    padding: 10px;
    margin-top: 5px;
    cursor: pointer;
}

.word-card {
    position: relative;
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 12px;
    margin-top: 10px;
}

/* content stays normal flow */
.word-content {
    padding-right: 40px; /* prevents overlap with buttons */
}

/* hidden by default */
.actions {
    position: absolute;
    bottom: 8px;
    right: 8px;

    display: flex;
    gap: 6px;

    opacity: 0;
    transition: opacity 0.2s ease;
}

.bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;

    display: flex;
    justify-content: center;
    gap: 10px;

    padding: 5px;
    background: white;
    border-top: 1px solid #ccc;
}

/* show on hover */
.word-card:hover .actions {
    opacity: 1;
}

.actions button {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 16px;
}


.actions button {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 16px;
    margin-left: 5px;
}

@media (hover: none) {
    .actions {
        opacity: 1;
    }
}

#versionDisplay {
    position: fixed;
    bottom: 5px;
    right: 8px;

    font-size: 11px;
    color: #aaa;

    opacity: 0.6;
    pointer-events: none;
}
</style>
</head>

<body>

<h1>Hokkien Dictionary</h1>
    
<h3 id="formTitle">Add Entry</h3>

<input id="wordInput" placeholder="Word">

<input
    id="pronunciationInput"
    rows="4"
    placeholder="Pronunciation">
</input>

<button id="submitBtn" onclick="addWord()">Add Word</button>

<hr>

<input
    id="searchInput"
    placeholder="Search..."
    oninput="renderWords()">

<div id="wordList"></div>

<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
background:rgba(0,0,0,0.5);">

  <div style="background:white; width:80%; max-width:600px; margin:100px auto; padding:15px; position:relative;">

    <h3 id="modalTitle"></h3>

    <textarea id="modalText" style="width:100%; height:300px;" readonly></textarea>

    <button id="modalAction" style="margin-top:10px;"></button>

  </div>
</div>

<div class="bottom-bar">
    <button onclick="openExport()">Export</button>
    <button onclick="openImport()">Import</button>
    
    <div id="versionDisplay"></div>
</div>

  
<script>

let editingId = null;
    
let dictionary =
JSON.parse(localStorage.getItem("dictionary") || "[]");
let a = "asd";

function saveDictionary(){
    localStorage.setItem(
        "dictionary",
        JSON.stringify(dictionary)
    );
}

function addWord(){

    const word =
    document.getElementById("wordInput")
    .value.trim();

    let pronunciation =
    document.getElementById("pronunciationInput")
    .value.trim();
    
    if(!word || !pronunciation){
        alert("Enter both word and pronunciation");
        return;
    }
	
    pronunciation = processPinyin(pronunciation);
    
    
    if(editingId !== null){

        // UPDATE existing entry
        const item = dictionary.find(d => d.id === editingId);
        item.word = word;
        item.pronunciation = pronunciation;

        editingId = null;

    } else {

        // ADD new entry
        dictionary.push({
            id: Date.now(),
            word,
            pronunciation
        });
    }

    saveDictionary();

    document.getElementById("wordInput").value="";
    document.getElementById("pronunciationInput").value="";

    document.getElementById("formTitle").innerText = "Add Entry";
    document.getElementById("submitBtn").innerText = "Add Word";

    renderWords();
}

function deleteWord(id){

    dictionary =
    dictionary.filter(item => item.id !== id);

    saveDictionary();
    renderWords();
}

function renderWords(){

    const search =
    document.getElementById("searchInput")
    .value.toLowerCase();

    const container =
    document.getElementById("wordList");

    container.innerHTML = "";

    const filtered =
    dictionary.filter(item =>
        item.word.toLowerCase().includes(search)
    );

    filtered.sort((a,b)=>
        a.word.localeCompare(b.word)
    );

    filtered.forEach(item => {

        const div =
        document.createElement("div");

        div.className = "word-card";

        div.innerHTML = `
            <div class="word-content">
                <div class="word-title">
                    ${item.word}
                </div>
        
                <div>
                    ${item.pronunciation}
                </div>
            </div>
        
            <div class="actions">
                <button onclick="editWord(${item.id})" title="Edit">✏️</button>
                <button onclick="deleteWord(${item.id})" title="Delete">🗑️</button>
            </div>
        `;
        container.appendChild(div);
    });
}

function convertTone(input) {

    const toneMap = {
        a: ["a", "ā", "á", "ǎ", "à"],
        o: ["o", "ō", "ó", "ǒ", "ò"],
        e: ["e", "ē", "é", "ě", "è"],
        i: ["i", "ī", "í", "ǐ", "ì"],
        u: ["u", "ū", "ú", "ǔ", "ù"]
        // ü intentionally NOT included
    };

        let syllable = input.replace(/v/g, "ü");
    let toneMatch = syllable.match(/([1-4])$/);
    let tone = toneMatch ? parseInt(toneMatch[1]) : 0;
    syllable = syllable.replace(/[1-4]$/, "");
    
    const priority = ["a", "o", "e", "i", "u"]; // standard rule order

    let targetIndex = -1;
    let targetVowel = null;

    for (let v of priority) {
        let index = syllable.indexOf(v);
        if (index !== -1) {
            targetIndex = index;
            targetVowel = v;
            break;
        }
    }

    // fallback: if no main vowel found
    if (targetIndex === -1) {
        return syllable;
    }

    // apply tone
    const tonedChar =
        tone > 0 && toneMap[targetVowel]
            ? toneMap[targetVowel][tone]
            : targetVowel;

    return (
        syllable.slice(0, targetIndex) +
        tonedChar +
        syllable.slice(targetIndex + 1)
    );
}


function editWord(id){

    const item = dictionary.find(d => d.id === id);

    document.getElementById("wordInput").value = item.word;
    document.getElementById("pronunciationInput").value = item.pronunciation;

    editingId = id;

    // UI changes
    document.getElementById("formTitle").innerText = "Editing";
    document.getElementById("submitBtn").innerText = "Change Word";
}

function exportData(){

    return JSON.stringify(
        dictionary.map(d => ({
            w: d.word,
            p: d.pronunciation
        }))
    );
}

function importData(data){

    try {
        const parsed = JSON.parse(data);

        dictionary = parsed.map(d => ({
            id: Date.now() + Math.random(),
            word: d.w,
            pronunciation: d.p
        }));

        saveDictionary();
        renderWords();

        alert("Import successful");

    } catch (e) {
        alert("Invalid import data");
    }
}

function openExport(){

    document.getElementById("modal").style.display = "block";
    document.getElementById("modalTitle").innerText = "Export Data";

    document.getElementById("modalText").value = exportData();

    document.getElementById("modalAction").innerText = "Close";
    document.getElementById("modalAction").onclick = closeModal;
}

function openImport(){

    document.getElementById("modal").style.display = "block";
    document.getElementById("modalTitle").innerText = "Import Data";

    document.getElementById("modalText").value = "";
    document.getElementById("modalText").placeholder =
        "Paste exported data here...";

    document.getElementById("modalText").readOnly = false;

    document.getElementById("modalAction").innerText = "Import";
    document.getElementById("modalAction").onclick = function(){

        importData(document.getElementById("modalText").value);

        closeModal();
    };
}

function closeModal(){

    document.getElementById("modal").style.display = "none";
    document.getElementById("modalText").readOnly = true;
}

function tokenize(input) {

    const result = [];
    let buffer = "";

    const isTone = c => /[1-4]/.test(c);

    for (let i = 0; i < input.length; i++) {

        const c = input[i];
        buffer += c;

        const next = input[i + 1];

        // end syllable when tone number appears
        if (isTone(c)) {
            result.push(buffer);
            buffer = "";
            continue;
        }

        // split when next char starts new syllable pattern
        if (
            next &&
            /[a-zü]/.test(next) &&
            buffer.match(/[aeiouü][^aeiouü1-4]*[1-4]?$/) &&
            buffer.match(/[1-4]$/)
        ) {
            result.push(buffer);
            buffer = "";
        }
    }

    if (buffer) result.push(buffer);

    return result.filter(x => x.length > 0);
}

function processPinyin(input) {

    input = input.toLowerCase().replace(/v/g, "ü");

    const syllables = tokenize(input);

    return syllables.map(convertTone).join(" ");
}

async function loadVersion() {

    const fallback = "v1 • —";

    try {
        const res = await fetch("version.json");

        if (!res.ok) {
            document.getElementById("versionDisplay").innerText = fallback;
            return;
        }

        const data = await res.json();

        const commit = data?.commit;

        if (!commit || typeof commit !== "string") {
            document.getElementById("versionDisplay").innerText = fallback;
            return;
        }

        document.getElementById("versionDisplay").innerText =
            "v1 • " + commit;

    } catch (e) {
        document.getElementById("versionDisplay").innerText = fallback;
    }
}

loadVersion();

loadVersion();

renderWords();

</script>

</body>
</html>
