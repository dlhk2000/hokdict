<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hokkien Dictionary</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width: 800px;
    margin: auto;
    padding: 20px;
}

input, textarea{
    width: 100%;
    padding: 8px;
    margin: 5px 0;
    box-sizing: border-box;
}

button{
    padding: 10px;
    margin-top: 5px;
    cursor: pointer;
}

.word-card {
    position: relative;
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 12px;
    margin-top: 10px;
}

/* content stays normal flow */
.word-content {
    padding-right: 40px; /* prevents overlap with buttons */
}

/* hidden by default */
.actions {
    position: absolute;
    bottom: 8px;
    right: 8px;

    display: flex;
    gap: 6px;

    opacity: 0;
    transition: opacity 0.2s ease;
}

/* show on hover */
.word-card:hover .actions {
    opacity: 1;
}

.actions button {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 16px;
}

.word-card {
    position: relative;
}

.word-card:hover .actions {
    opacity: 1;
}

.actions button {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 16px;
    margin-left: 5px;
}

@media (hover: none) {
    .actions {
        opacity: 1;
    }
}
</style>
</head>

<body>

<h1>Hokkien Dictionary</h1>

<h3>Add Entry</h3>

<input id="wordInput" placeholder="Word">

<input
    id="pronunciationInput"
    rows="4"
    placeholder="Pronunciation">
</input>

<button onclick="addWord()">Add Word</button>

<hr>

<input
    id="searchInput"
    placeholder="Search..."
    oninput="renderWords()">

<div id="wordList"></div>

<script>

let editingId = null;
    
let dictionary =
JSON.parse(localStorage.getItem("dictionary") || "[]");

function saveDictionary(){
    localStorage.setItem(
        "dictionary",
        JSON.stringify(dictionary)
    );
}

function addWord(){

    const word =
    document.getElementById("wordInput")
    .value.trim();

    let pronunciation =
    document.getElementById("pronunciationInput")
    .value.trim();
    
    if(!word || !pronunciation){
        alert("Enter both word and pronunciation");
        return;
    }

    pronunciation = convertTone(pronunciation);
    pronunciation = autoSpacePinyin(pronunciation);
    
    if(editingId !== null){

        // UPDATE existing entry
        const item = dictionary.find(d => d.id === editingId);
        item.word = word;
        item.pronunciation = pronunciation;

        editingId = null;

    } else {

        // ADD new entry
        dictionary.push({
            id: Date.now(),
            word,
            pronunciation
        });
    }

    saveDictionary();

    document.getElementById("wordInput").value="";
    document.getElementById("pronunciationInput").value="";

    renderWords();
}

function deleteWord(id){

    dictionary =
    dictionary.filter(item => item.id !== id);

    saveDictionary();
    renderWords();
}

function renderWords(){

    const search =
    document.getElementById("searchInput")
    .value.toLowerCase();

    const container =
    document.getElementById("wordList");

    container.innerHTML = "";

    const filtered =
    dictionary.filter(item =>
        item.word.toLowerCase().includes(search)
    );

    filtered.sort((a,b)=>
        a.word.localeCompare(b.word)
    );

    filtered.forEach(item => {

        const div =
        document.createElement("div");

        div.className = "word-card";

        div.innerHTML = `
            <div class="word-content">
                <div class="word-title">
                    ${item.word}
                </div>
        
                <div>
                    ${item.pronunciation}
                </div>
            </div>
        
            <div class="actions">
                <button onclick="editWord(${item.id})" title="Edit">✏️</button>
                <button onclick="deleteWord(${item.id})" title="Delete">🗑️</button>
            </div>
        `;
        container.appendChild(div);
    });
}

function convertTone(input) {

    const toneMap = {
        a: ["a", "ā", "á", "ǎ", "à"],
        o: ["o", "ō", "ó", "ǒ", "ò"],
        e: ["e", "ē", "é", "ě", "è"],
        i: ["i", "ī", "í", "ǐ", "ì"],
        u: ["u", "ū", "ú", "ǔ", "ù"]
        // ü intentionally NOT included
    };

    const match = input.match(/([1-4])$/);
    let tone = match ? parseInt(match[1]) : 0;

    let syllable = input
        .replace(/v/g, "ü")
        .replace(/[1-4]$/, "");

    const priority = ["a", "o", "e", "i", "u"]; // standard rule order

    let targetIndex = -1;
    let targetVowel = null;

    for (let v of priority) {
        let index = syllable.indexOf(v);
        if (index !== -1) {
            targetIndex = index;
            targetVowel = v;
            break;
        }
    }

    // fallback: if no main vowel found
    if (targetIndex === -1) {
        return syllable;
    }

    // apply tone
    const tonedChar =
        tone > 0 && toneMap[targetVowel]
            ? toneMap[targetVowel][tone]
            : targetVowel;

    return (
        syllable.slice(0, targetIndex) +
        tonedChar +
        syllable.slice(targetIndex + 1)
    );
}

function autoSpacePinyin(input) {

    input = input.replace(/([1-4])/g, "$1 "); // keep tone number separate

    // split before each consonant that starts a new syllable
    return input
        .trim()
        .replace(/([aeiouü][^aeiouü1-4]+)/g, "$1 ")
        .replace(/\s+/g, " ")
        .trim();
}

function editWord(id){

    const item = dictionary.find(d => d.id === id);

    document.getElementById("wordInput").value = item.word;
    document.getElementById("pronunciationInput").value = item.pronunciation;

    editingId = id;
}
    
renderWords();

</script>

</body>
</html>
